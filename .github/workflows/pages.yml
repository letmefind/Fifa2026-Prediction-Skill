name: Deploy GitHub Pages demo

on:
  push:
    branches: [main]
    paths:
      - "docs/index.html"
      - "docs/demo.css"
      - "docs/demo.js"
      - "docs/.nojekyll"
      - "index.html"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: github-pages-demo
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare static site (dashboard only)
        run: |
          mkdir -p _site
          cp docs/index.html docs/demo.css docs/demo.js docs/.nojekyll _site/

      - name: Deploy to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./_site
          publish_branch: gh-pages
          force_orphan: true
          commit_message: "Deploy dashboard demo"
